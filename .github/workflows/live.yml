name: Live

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

env:
  PI_IMAGE: localhost/parley-pi-worker:0.78.0
  M5_CANCEL_IMAGE: docker.io/library/alpine:3.20
  VALIDATION_IMAGE: docker.io/library/golang:1.26

jobs:
  m5-cancel:
    name: M5 cancel live
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman uidmap slirp4netns fuse-overlayfs
          podman --version
          podman info

      - name: Pull cancel image
        run: podman pull "${M5_CANCEL_IMAGE}"

      - name: Run M5 cancel live suite
        run: make test-live-m5

  # This credentialed Pi job intentionally targets GitHub-hosted ubuntu-latest:
  # it installs podman and runs it rootless as the Actions runner user. If that
  # proves unreliable, move this job to a self-hosted runner label and keep the
  # credential-free m5-cancel job on ubuntu-latest.
  pi-live:
    name: Pi live
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAS_PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON != '' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman uidmap slirp4netns fuse-overlayfs
          podman --version
          podman info

      - name: Skip credentialed Pi live tests
        if: ${{ env.HAS_PI_AUTH_JSON != 'true' }}
        run: echo "PI_AUTH_JSON is not configured; skipping credentialed Pi live tests."

      - name: Build Pi worker image
        if: ${{ env.HAS_PI_AUTH_JSON == 'true' }}
        run: podman build -t "${PI_IMAGE}" build/pi

      - name: Pull validation image
        if: ${{ env.HAS_PI_AUTH_JSON == 'true' }}
        run: podman pull "${VALIDATION_IMAGE}"

      - name: Provision pi-auth volume
        if: ${{ env.HAS_PI_AUTH_JSON == 'true' }}
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          set -euo pipefail
          podman volume create pi-auth
          mountpoint="$(podman volume inspect pi-auth --format '{{ .Mountpoint }}')"
          mkdir -p "${mountpoint}/agent"
          printf '%s' "${PI_AUTH_JSON}" > "${mountpoint}/agent/auth.json"
          chmod 600 "${mountpoint}/agent/auth.json"

      - name: Run M4 Pi live suite
        if: ${{ env.HAS_PI_AUTH_JSON == 'true' }}
        run: make test-live-m4

      - name: Run M5 Pi loop live suite
        if: ${{ env.HAS_PI_AUTH_JSON == 'true' }}
        run: make test-live-m5-loop

  notify-nightly-failure:
    name: Notify nightly live failure
    runs-on: ubuntu-latest
    needs: [m5-cancel, pi-live]
    if: ${{ failure() && github.event_name == 'schedule' }}
    permissions:
      issues: write
    steps:
      - name: Open or update live failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE_PREFIX: "Nightly live failure:"
        run: |
          set -euo pipefail

          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result == "failure")
              | .key
            ' <<<"${NEEDS_JSON}" \
              | while IFS= read -r job_id; do
                  case "${job_id}" in
                    m5-cancel) printf '%s\n' "M5 cancel live" ;;
                    pi-live) printf '%s\n' "Pi live" ;;
                    *) printf '%s\n' "${job_id}" ;;
                  esac
                done
          )"

          if [[ -z "${failed_jobs}" ]]; then
            echo "No failed live jobs found in needs context."
            exit 0
          fi

          failed_summary="$(
            printf '%s\n' "${failed_jobs}" \
              | awk 'BEGIN { first = 1 } { if (!first) printf ", "; printf "%s", $0; first = 0 }'
          )"
          issue_title="${TITLE_PREFIX} ${failed_summary}"
          needs_summary="$(
            jq -r '
              to_entries[]
              | "- \(.key): \(.value.result)"
            ' <<<"${NEEDS_JSON}"
          )"
          body="$(
            printf 'A scheduled live workflow run failed.\n\n'
            printf 'Run: %s\n' "${RUN_URL}"
            printf 'Failing job(s): %s\n\n' "${failed_summary}"
            printf 'Needs results:\n%s\n' "${needs_summary}"
          )"

          existing_issue="$(
            gh issue list \
              --state open \
              --search "in:title \"${TITLE_PREFIX}\"" \
              --limit 100 \
              --json number,title \
              | jq -r --arg prefix "${TITLE_PREFIX}" \
                  'map(select(.title | startswith($prefix))) | .[0].number // empty'
          )"

          if [[ -n "${existing_issue}" ]]; then
            printf '%s\n' "${body}" \
              | gh issue comment "${existing_issue}" --body-file -
          else
            printf '%s\n' "${body}" \
              | gh issue create \
                  --title "${issue_title}" \
                  --label bug \
                  --body-file -
          fi
