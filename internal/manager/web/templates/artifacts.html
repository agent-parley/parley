<section id="artifacts" class="card">
  <h2>Artifacts</h2>
  {{if .ArtifactViews}}
  <ul>
    {{range .ArtifactViews}}
    <li>
      <a href="/artifacts/{{.ID}}">{{short .ID}}</a>
      <span class="muted">{{.Kind}} · {{.MediaType}}</span>
      {{if .DownloadOnly}}<span class="muted">download only</span>{{end}}
      {{if .Preview}}<pre class="artifact-preview">{{.Preview}}</pre>{{end}}
    </li>
    {{end}}
  </ul>
  {{else}}
  <p>No artifacts yet.</p>
  {{end}}
</section>
