<header id="run-summary" class="card run-header">
  <div class="run-title-block">
    <p class="eyebrow">Task drill-in</p>
    <h1>{{.Run.Idea}}</h1>
    <div class="run-meta-row">
      <span class="pill {{statusClass .Run.Status}}">{{statusLabel .Run.Status}}</span>
      <span>Project <code>{{.Project.ID}}</code></span>
      <span>Task <code>{{.Task.ID}}</code></span>
      <span>Run <code>{{.Run.ID}}</code></span>
      <span>Template <code>{{.Run.WorkflowTemplateID}}</code></span>
      <span>Updated {{timeLabel .Run.UpdatedAt}}</span>
      {{if .PRReady.Branch}}<span>Branch <code>{{.PRReady.Branch}}</code></span>{{end}}
    </div>
  </div>
</header>
