<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <script type="module" src="/assets/datastar.min.js"></script>
  <style>{{template "styles" .}}</style>
</head>
<body data-on:load="@get('/runs/{{.View.Run.ID}}/events', {openWhenHidden: true})">
  <main>
    <nav><a href="/">← Runs</a></nav>
    {{template "run_summary.html" .View}}
    <section class="card">
      <form method="post" action="/runs/{{.View.Run.ID}}/cancel">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <button type="submit" class="danger">Cancel run</button>
      </form>
    </section>
    {{template "stage_statuses.html" .View}}
    {{template "event_log.html" .View}}
    {{template "diff_patch.html" .View}}
    {{template "artifacts.html" .View}}
  </main>
</body>
</html>
