<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <script type="module" src="/assets/datastar.min.js"></script>
  <style>{{template "styles" .}}</style>
</head>
<body class="run-page tab-{{.Tab}}" data-signals:csrf="'{{.CSRF}}'" data-on:load="@get('/notifications/events', {openWhenHidden: true}); @get('/projects/{{.View.Project.ID}}/runs/{{.View.Run.ID}}/events', {openWhenHidden: true})">
  {{template "notifications_center.html" .Notifications}}
  <main class="run-main">
    <nav class="breadcrumb"><a href="/projects/{{.View.Project.ID}}">← {{.View.Project.Name}}</a></nav>
    {{template "run_summary.html" .View}}

    <section class="card run-controls" aria-label="Run controls">
      <form method="post" action="/projects/{{.View.Project.ID}}/runs/{{.View.Run.ID}}/cancel">
        <input type="hidden" name="_csrf" value="{{.CSRF}}">
        <button type="submit" class="danger">Cancel run</button>
      </form>
    </section>

    <nav class="run-tabs" aria-label="Run detail tabs">
      <a class="{{if eq .Tab "story"}}active{{end}}" href="/projects/{{.View.Project.ID}}/runs/{{.View.Run.ID}}">Story</a>
      <a class="{{if eq .Tab "review"}}active{{end}}" href="/projects/{{.View.Project.ID}}/runs/{{.View.Run.ID}}?tab=review">Review</a>
    </nav>

    {{template "story_panel.html" .View}}
    {{template "review_panel.html" .View}}
  </main>
</body>
</html>
